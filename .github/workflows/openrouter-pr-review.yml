name: Tier-1 Quick Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  quick-review:
    runs-on: self-hosted
    timeout-minutes: 5
    concurrency:
      group: ${{ github.repository }}-tier1-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gather diff for review
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          git fetch origin "$BASE_REF" "$HEAD_REF"
          git diff "origin/$BASE_REF...HEAD" > /tmp/pr.diff
          git diff --name-status "origin/$BASE_REF...HEAD" > /tmp/pr.files
          git log --oneline --no-merges "origin/$BASE_REF..HEAD" > /tmp/pr.commits
          echo "Diff: $(wc -l < /tmp/pr.diff) lines across $(wc -l < /tmp/pr.files) files"

      - name: Run Tier-1 review
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_PR_REVIEW_KEY }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          python3 "$GITHUB_WORKSPACE/scripts/tier1-review.py"
