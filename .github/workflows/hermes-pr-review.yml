name: Hermes PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: self-hosted
    timeout-minutes: 90
    concurrency:
      group: ${{ github.repository }}-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Hermes code-reviewer service (port 8643)
        run: |
          set -euo pipefail
          echo "Verifying Hermes code-reviewer service is reachable on port 8643..."
          if ! curl -fsS --max-time 10 http://127.0.0.1:8643/health > /tmp/hermes_health.json 2>&1; then
            echo "ERROR: Hermes code-reviewer service (port 8643) is not reachable."
            echo "Health response: $(cat /tmp/hermes_health.json 2>/dev/null || echo '(no response)')"
            echo "Check: systemctl --user status hermes-code-reviewer"
            exit 1
          fi
          echo "Hermes health OK: $(cat /tmp/hermes_health.json)"

      - name: Gather PR context
        id: context
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          git fetch origin "$BASE_REF" "$HEAD_REF"

          git diff "origin/$BASE_REF...HEAD" > /tmp/pr.diff
          git diff --name-status "origin/$BASE_REF...HEAD" > /tmp/pr.files
          git log --oneline --no-merges "origin/$BASE_REF..HEAD" > /tmp/pr.commits

          CHANGED_DIRS=$(git diff --name-only "origin/$BASE_REF...HEAD" \
            | xargs -I{} dirname {} | sort -u | tr '\n' ' ')
          echo "changed_dirs=$CHANGED_DIRS" >> "$GITHUB_OUTPUT"

          HAS_SHELL=$(git diff --name-only "origin/$BASE_REF...HEAD" \
            | grep -cE '\.(sh|bash)$' || true)
          echo "has_shell=$HAS_SHELL" >> "$GITHUB_OUTPUT"

          DIFF_LINES=$(wc -l < /tmp/pr.diff)
          echo "diff_lines=$DIFF_LINES" >> "$GITHUB_OUTPUT"
          echo "PR diff: $DIFF_LINES lines across $(wc -l < /tmp/pr.files) changed files"

      - name: Truncate diff if oversized
        run: |
          set -euo pipefail
          MAX_LINES=4000
          ACTUAL=$(wc -l < /tmp/pr.diff)
          if [ "$ACTUAL" -gt "$MAX_LINES" ]; then
            echo "WARNING: Diff is $ACTUAL lines (max $MAX_LINES) — truncating. Hermes should read full files via terminal."
            head -n "$MAX_LINES" /tmp/pr.diff > /tmp/pr.diff.trunc
            printf '\n[... diff truncated at %s of %s lines — Hermes: read full files via terminal at %s ...]\n' \
              "$MAX_LINES" "$ACTUAL" "$GITHUB_WORKSPACE" >> /tmp/pr.diff.trunc
            mv /tmp/pr.diff.trunc /tmp/pr.diff
          else
            echo "Diff size OK: $ACTUAL lines"
          fi

      - name: Pre-flight context (tests + build)
        id: preflight
        run: |
          set -euo pipefail
          WORKSPACE="$GITHUB_WORKSPACE"
          TIMEOUT=300  # 5 minutes max for pre-flight

          echo "(not run)" > /tmp/preflight_test.txt
          echo "(not run)" > /tmp/preflight_build.txt

          TEST_CMD=""
          BUILD_CMD=""

          # Per-repo override: .hermes-review.yml takes precedence
          if [ -f "$WORKSPACE/.hermes-review.yml" ]; then
            TEST_CMD=$(python3 -c "import sys,yaml; cfg=yaml.safe_load(open(sys.argv[1])); print(cfg.get('test_command',''))" "$WORKSPACE/.hermes-review.yml" 2>/dev/null || true)
            BUILD_CMD=$(python3 -c "import sys,yaml; cfg=yaml.safe_load(open(sys.argv[1])); print(cfg.get('build_command',''))" "$WORKSPACE/.hermes-review.yml" 2>/dev/null || true)
          fi

          # Auto-detect if no override
          if [ -z "$TEST_CMD" ]; then
            if [ -f "$WORKSPACE/Cargo.toml" ]; then
              TEST_CMD="cargo test 2>&1 | tail -20"
              BUILD_CMD="cargo build 2>&1 | tail -5"
            elif [ -f "$WORKSPACE/package.json" ] && command -v bun &>/dev/null; then
              grep -q '"test"' "$WORKSPACE/package.json" 2>/dev/null && TEST_CMD="bun test --bail 2>&1 | tail -30" || true
              grep -q '"build"' "$WORKSPACE/package.json" 2>/dev/null && BUILD_CMD="bun run build 2>&1 | tail -10" || true
            elif [ -f "$WORKSPACE/package.json" ]; then
              TEST_CMD="npm test -- --passWithNoTests 2>&1 | tail -20"
            elif [ -f "$WORKSPACE/pyproject.toml" ] || [ -f "$WORKSPACE/requirements.txt" ]; then
              TEST_CMD="python -m pytest --tb=short -q 2>&1 | tail -20"
            fi
          fi

          cd "$WORKSPACE"

          if [ -n "$TEST_CMD" ]; then
            echo "Running tests: $TEST_CMD"
            timeout "$TIMEOUT" bash -c "$TEST_CMD" > /tmp/preflight_test.txt 2>&1 || \
              echo "[tests exited non-zero — see above]" >> /tmp/preflight_test.txt
          fi

          if [ -n "$BUILD_CMD" ]; then
            echo "Running build: $BUILD_CMD"
            timeout "$TIMEOUT" bash -c "$BUILD_CMD" > /tmp/preflight_build.txt 2>&1 || \
              echo "[build exited non-zero — see above]" >> /tmp/preflight_build.txt
          fi

          # Repo tree (top 3 levels, exclude noise)
          find . -maxdepth 3 \
            -not -path './.git/*' -not -path './node_modules/*' -not -path './target/*' \
            -not -path './.svelte-kit/*' -not -path './dist/*' -not -path './__pycache__/*' \
            | sort | head -100 > /tmp/preflight_tree.txt 2>/dev/null || true

          echo "Pre-flight complete. Test: $(wc -l < /tmp/preflight_test.txt) lines, Build: $(wc -l < /tmp/preflight_build.txt) lines"

      - name: Build Hermes task JSON
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          REPO: ${{ github.repository }}
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
          CHANGED_DIRS: ${{ steps.context.outputs.changed_dirs }}
          HAS_SHELL: ${{ steps.context.outputs.has_shell }}
        run: |
          set -euo pipefail
          # Build the prompt text safely using a Python heredoc
          # All untrusted values arrive as env vars and are JSON-encoded by python — no shell injection
          python3 << 'PYEOF'
          import os, json

          def _read(path, default="(not available)"):
              try:
                  return open(path).read().strip() or default
              except Exception:
                  return default

          has_shell = int(os.environ.get("HAS_SHELL", "0"))
          shell_section = ""
          if has_shell > 0:
              shell_section = """
          ## Shell Script Review
          This PR modifies shell scripts. Apply bash-script-fix skill behaviors:
          - Check for missing `set -euo pipefail`
          - Flag unquoted variables and word-splitting risks
          - Verify exit codes are checked after critical commands
          - Flag any command injection risks from unvalidated inputs
          """

          test_result = _read('/tmp/preflight_test.txt')
          build_result = _read('/tmp/preflight_build.txt')
          repo_tree = _read('/tmp/preflight_tree.txt')

          prompt = f"""# GitHub Pull Request Code Review

          You are performing a thorough code review of a GitHub pull request.
          The repository is checked out at: {os.environ['GITHUB_WORKSPACE']}

          ## PR Details
          - Repository: {os.environ['REPO']}
          - PR #{os.environ['PR_NUMBER']}: {os.environ['PR_TITLE']}
          - Author: {os.environ['PR_AUTHOR']}
          - Base → Head: {os.environ['BASE_REF']} → {os.environ['HEAD_REF']}
          - Changed directories: {os.environ['CHANGED_DIRS']}

          ## Pre-flight Test Results
          {test_result}

          ## Pre-flight Build Status
          {build_result}

          ## Repository Tree (top 3 levels)
          {repo_tree}

          ## Commits in This PR
          {_read('/tmp/pr.commits')}

          ## Changed Files
          {_read('/tmp/pr.files')}

          ## Diff
          {_read('/tmp/pr.diff')}

          ---

          ## Review Instructions

          You are an independent code reviewer. You have no prior context about how these
          changes were made — that is intentional. Fresh eyes catch what the author misses.
          No agent should verify its own work.

          Work through the phases below in order. Use your terminal and file tools throughout.

          ---

          ### Phase 0 — Codebase Orientation (codebase-deep-dive skill)

          Before reading a single line of diff, orient yourself to the project. In
          {os.environ['GITHUB_WORKSPACE']}, read these files in order (stop when none remain):

          1. README.md — purpose, quick-start, architecture overview
          2. ARCHITECTURE.md or DESIGN_PLAN.md — stack choices, directory layout, DB schema
          3. CLAUDE.md or CONVENTIONS.md — coding standards and project-specific gotchas
          4. pyproject.toml / package.json / Cargo.toml / go.mod — dependencies and runtime

          Extract and note: tech stack, database/ORM, test command, and any stated conventions.
          This context governs all findings below — do not flag style issues that conflict with
          documented project conventions.

          ---

          ### Phase 1 — Static Security Scan (requesting-code-review skill)

          Run these terminal commands against the diff at /tmp/pr.diff. Any match is a
          potential security concern — note the line and include it in Phase 3 findings.

          ```bash
          # Hardcoded secrets
          grep "^+" /tmp/pr.diff | grep -iE "(api_key|secret|password|token|passwd)\\s*=\\s*['\"][^'\"]{{6,}}['\"]"

          # Shell injection (Python)
          grep "^+" /tmp/pr.diff | grep -E "os\\.system\\(|subprocess.*shell=True"

          # Dangerous eval/exec
          grep "^+" /tmp/pr.diff | grep -E "\\beval\\(|\\bexec\\("

          # Unsafe deserialization
          grep "^+" /tmp/pr.diff | grep -E "pickle\\.loads?\\("

          # SQL injection (string formatting in queries)
          grep "^+" /tmp/pr.diff | grep -E "execute\\(f\"|\\.format\\(.*SELECT|\\.format\\(.*INSERT"

          # JavaScript XSS
          grep "^+" /tmp/pr.diff | grep -E "innerHTML\\s*=|dangerouslySetInnerHTML"
          ```

          ---

          ### Phase 2 — Baseline Test Check (requesting-code-review skill)

          Detect the project's test framework and run the suite BEFORE applying changes
          (stash the diff), then again AFTER. Only NEW failures introduced by this PR matter.

          ```bash
          cd {os.environ['GITHUB_WORKSPACE']}

          # Detect framework and run — pick the one that matches
          # Python:  python -m pytest --tb=no -q 2>&1 | tail -5
          # Node:    npm test -- --passWithNoTests 2>&1 | tail -5
          # Rust:    cargo test 2>&1 | tail -5
          # Go:      go test ./... 2>&1 | tail -5

          # Run linting if tools are installed (silently skip if not):
          which ruff && ruff check . 2>&1 | tail -10
          which mypy && mypy . --ignore-missing-imports 2>&1 | tail -10
          which npx && npx tsc --noEmit 2>&1 | tail -10
          ```

          Record the baseline failure count. Then restore HEAD and run again. Report only
          regressions introduced by the PR, not pre-existing failures.

          ---

          ### Phase 3 — Diff Analysis

          Now read the diff and changed files. Use terminal to read full file context wherever
          the diff alone is insufficient to judge correctness or intent.

          **Skills to activate during analysis:**

          **GitHub workflow review** (github skill): Use gh CLI if needed to fetch linked
          issues or related PRs. Verify commit messages are clear and branch naming follows
          project conventions.

          **Test infrastructure review** (test-infrastructure-pitfalls skill): Check for schema
          divergence between test fixtures and production migrations. Verify feature completeness
          — tests must cover error paths, not just happy paths. Flag tests that share state
          across cases or skip cleanup, which would pass locally but fail in CI.

          {shell_section}

          **Security review**: Beyond the Phase 1 scan, flag:
          - Insecure direct object references or missing ownership checks on new endpoints
          - Missing auth/authz guards
          - New dependency additions — note the package name; flag if unfamiliar or recently
            published (supply chain awareness, oss-forensics discipline)

          **Two-stage assessment — answer both independently:**
          1. *Spec compliance:* Does the code do what the PR title and commit messages claim?
             Are there unstated side effects or scope creep?
          2. *Code quality:* Is the implementation well-built — correct edge cases, no logic
             errors, adequate test coverage, readable, no regressions?

          **Review criteria for each changed file:**
          1. Correctness — logic matches stated intent; edge cases and error paths covered
          2. Test coverage — new behavior tested; fixtures in sync with production schema
          3. Security — Phase 1 findings plus the above
          4. Readability — clear identifiers; added complexity is justified
          5. Performance — N+1 queries, unbounded loops, implied missing indexes
          6. Breaking changes — public API, serialization format, or schema changes that need
             a migration or coordinated deploy

          ---

          ### Anti-Hallucination Rules (cite-before-answer / research-protocol discipline)

          - Only cite file paths and line numbers you have actually read via terminal or file
            tools in this session. If unsure, read the file before citing it.
          - Mark unverified inferences with [HYPOTHESIS].
          - Do not invent function signatures or behavior. Read the file first.
          - If the diff was truncated, say so and use terminal to read the full file.
          - Every finding must cite the specific file and line that supports it.

          ---

          ### Output Format

          Produce a GitHub PR review comment in markdown:

          ## Summary
          What the PR does, overall quality signal, and the single most important finding.

          ## Security Scan Results
          Findings from Phase 1 grep commands. "None found" is a valid result.

          ## Test Regression Check
          Baseline vs. HEAD failure counts. Any new failures are blocking.

          ## Findings

          **[SEVERITY] `file:line` — Title**
          Description. Suggested fix if non-obvious.

          Severity: CRITICAL | HIGH | MEDIUM | LOW | NIT
          Large diff (>200 changed lines): report CRITICAL and HIGH only.
          Small diff (<50 changed lines): report all severity levels.

          ## Spec Compliance
          Does the implementation match what the PR claims to do? PASS or list of gaps.

          ## Test Coverage Assessment
          Observations using test-infrastructure-pitfalls patterns.

          ## Verdict
          One of: ✅ Approve | ⚠️ Approve with comments | 🔴 Request changes
          One-sentence reason.
          """

          payload = {"input": prompt, "store": False}
          with open("/tmp/hermes_task.json", "w") as f:
              json.dump(payload, f)

          print("Prompt written to /tmp/hermes_task.json")
          PYEOF

      - name: Run Hermes review
        id: hermes_review
        env:
          HERMES_API_KEY: ${{ secrets.HERMES_API_KEY }}
        run: |
          set -euo pipefail

          # Warn if MAX_WAIT leaves less than 10 minutes before job timeout
          TIMEOUT_SECONDS=$((90 * 60))
          MAX_WAIT=4800
          MARGIN=$((TIMEOUT_SECONDS - MAX_WAIT))
          if [ "$MARGIN" -lt 600 ]; then
            echo "WARNING: MAX_WAIT=${MAX_WAIT}s leaves only ${MARGIN}s before job timeout (${TIMEOUT_SECONDS}s). Consider reducing MAX_WAIT."
          fi

          (
            flock -x 200
            echo "[$(date -u +%H:%M:%S)] Hermes slot acquired — POSTing to port 8643 (code-reviewer profile)"

            HTTP_CODE=$(curl -s -o /tmp/hermes_runs_response.json -w "%{http_code}" \
              --max-time 30 \
              -X POST http://127.0.0.1:8643/v1/runs \
              -H "Authorization: Bearer $HERMES_API_KEY" \
              -H "Content-Type: application/json" \
              -d @/tmp/hermes_task.json)

            echo "POST /v1/runs — HTTP $HTTP_CODE"
            echo "Response: $(cat /tmp/hermes_runs_response.json)"

            if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
              echo "ERROR: Hermes API returned HTTP $HTTP_CODE — failing."
              exit 1
            fi

            RUN_ID=$(python3 -c "import json; print(json.load(open('/tmp/hermes_runs_response.json'))['run_id'])")
            echo "run_id: $RUN_ID"

            ELAPSED=0
            POLL=15

            while [ "$ELAPSED" -lt "$MAX_WAIT" ]; do
              POLL_RESPONSE=$(curl -s --max-time 15 "http://127.0.0.1:8643/v1/runs/$RUN_ID" \
                -H "Authorization: Bearer $HERMES_API_KEY")
              CURL_EXIT=$?

              if [ "$CURL_EXIT" -ne 0 ]; then
                echo "[${ELAPSED}s] WARNING: poll request failed (curl exit $CURL_EXIT) — will retry"
              else
                STATUS=$(echo "$POLL_RESPONSE" | python3 -c \
                  "import sys,json; print(json.load(sys.stdin).get('status','unknown'))")
                MODEL=$(echo "$POLL_RESPONSE" | python3 -c \
                  "import sys,json; d=json.load(sys.stdin); print(d.get('model') or d.get('config',{}).get('model','unknown'))" 2>/dev/null || echo "unknown")
                echo "[${ELAPSED}s] status: $STATUS | model: $MODEL"
                echo "$POLL_RESPONSE" > /tmp/hermes_poll_latest.json

                if [ "$STATUS" = "completed" ]; then
                  cp /tmp/hermes_poll_latest.json /tmp/hermes_run_result.json
                  python3 << 'PYEOF'
          import json
          r = json.load(open('/tmp/hermes_run_result.json'))
          out = r.get("output") or ""
          if isinstance(out, list):
              out = "\n".join(
                  x.get("text", str(x)) if isinstance(x, dict) else str(x)
                  for x in out
              )
          with open("/tmp/hermes_review.md", "w") as f:
              f.write(out)
          model = r.get("model") or r.get("config", {}).get("model", "unknown")
          with open("/tmp/hermes_model.txt", "w") as f:
              f.write(str(model))
          PYEOF
                  echo "status=completed" >> "$GITHUB_OUTPUT"
                  break

                elif [ "$STATUS" = "failed" ] || [ "$STATUS" = "error" ]; then
                  echo "ERROR: Hermes run $RUN_ID ended with status '$STATUS'"
                  echo "$POLL_RESPONSE" >> /tmp/hermes_run_result.json
                  echo "status=failed" >> "$GITHUB_OUTPUT"
                  exit 1
                fi
              fi

              sleep "$POLL"
              ELAPSED=$((ELAPSED + POLL))
            done

            if [ "$ELAPSED" -ge "$MAX_WAIT" ]; then
              echo "ERROR: Hermes run $RUN_ID did not complete within ${MAX_WAIT}s"
              echo "status=timeout" >> "$GITHUB_OUTPUT"
              exit 1
            fi

          ) 200>/tmp/hermes_global.lock

      - name: Post review comment
        if: steps.hermes_review.outputs.status == 'completed'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('/tmp/hermes_review.md', 'utf8').trim();
            if (!review || review === '(empty)') {
              core.setFailed('Hermes returned an empty review — check model or context limits');
              return;
            }
            const model = fs.existsSync('/tmp/hermes_model.txt')
              ? fs.readFileSync('/tmp/hermes_model.txt', 'utf8').trim()
              : 'unknown model';
            const ts = new Date().toISOString().slice(0, 16) + ' UTC';
            const header = `> 🤖 **Hermes Code Review** (${model}) · ${ts}\n\n`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: header + review
            });

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: hermes-review-debug-pr${{ github.event.pull_request.number }}
          path: |
            /tmp/hermes_task.json
            /tmp/hermes_runs_response.json
            /tmp/hermes_run_result.json
            /tmp/hermes_poll_latest.json
            /tmp/hermes_health.json
          retention-days: 7
          if-no-files-found: ignore

      - name: Post failure notice
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            let logSnippet = '';
            try {
              logSnippet = execSync(
                'tail -n 50 ~/.hermes/profiles/code-reviewer/logs/agent.log 2>/dev/null || echo "(log not available)"'
              ).toString().slice(0, 2000);
            } catch (e) {
              logSnippet = '(could not read agent log)';
            }
            const ts = new Date().toISOString().slice(0, 16) + ' UTC';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `> 🤖 **Hermes Review** — agent run failed or timed out · ${ts}`,
              '',
              `Check the [Actions log](${runUrl}) and the \`hermes-review-debug\` artifact for details.`,
              '',
              '<details><summary>Last 50 lines of agent.log</summary>',
              '',
              '```',
              logSnippet,
              '```',
              '</details>'
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
