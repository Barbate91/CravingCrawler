# CravingCrawler configuration
# This is the single config file for the entire stack.

settings:
  interval_minutes: 1440        # how often the scraper loops (once per day)
  rate_limit_seconds: 5         # pause between HTTP requests

notifications:
  enabled: true
  discord_webhook_url: "${DISCORD_WEBHOOK_URL}"
  # discord_bot_token: "${DISCORD_BOT_TOKEN}"
  # discord_target_user_id: "${DISCORD_TARGET_USER_ID}"

# ─── Site definitions ───────────────────────────────────────────────
# Each defines HOW to scrape a particular brand/shop.

sites:
  # Crumbl Cookies — weekly rotating flavors extracted from __NEXT_DATA__
  crumbl:
    type: embedded
    embedded:
      scriptSelector: "#__NEXT_DATA__"
      itemsPath: "props.pageProps.products.rotatingMenu.items"
      titleKey: "dessert.name"
      descriptionKey: "dessert.description"
      imageKey: "dessert.aerialImage"

  # Sweet Petite Confections — Square Online shop (JS-rendered Vue app)
  # Products render client-side; selectors from live DOM inspection
  sweet-petite:
    type: browser
    selectors:
      item: ".product-group"
      title: ".w-product-title"
      price: ".product-price__wrapper"
      image: ".figure__image img"
      link: "a[href]"
    browser:
      waitForSelector: ".w-product-title"
      timeout: 25000
    detail_description_selector: ".w-product-description"

  # Nothing Bundt Cakes — Magento site, JS-rendered flavor grid
  nothing-bundt-cakes:
    type: browser
    selectors:
      item: ".flavors-item"
      title: ".header-bold"
      image: ".flavors-image img"
    browser:
      waitForSelector: ".flavors-item"
      timeout: 20000

  # Insomnia Cookies — React SPA, "For You" tab = seasonal/limited-time items
  insomnia-cookies:
    type: browser
    selectors:
      item: "[data-ddog-id=product_card]"
      title: "h4"
      image: "img.product-main-image"
    browser:
      waitForSelector: "[data-ddog-id=product_card]"
      timeout: 20000
      sectionSelector: "#for-you"

  # Stella Jean's Ice Cream — Squarespace, seasonal scoops
  # Images are in sibling blocks before titles; zip-mode pairs them by index
  # Scoped to the seasonal section to avoid grabbing site-wide images
  stella-jeans:
    type: html
    selectors:
      title: "section[data-section-id='67c734602e71b06358c9d538'] .sqs-html-content h4"
      image: "section[data-section-id='67c734602e71b06358c9d538'] img[data-src]"

  # Batch & Box — Shopify, /pages/cookies seasonal section (JS-rendered titles)
  # sectionScript extracts only items between "Seasonal Treats" h2 and the next h2
  batch-and-box:
    type: browser
    selectors:
      item: ".item"
      title: "h3"
      image: "img"
      description: "p"
    browser:
      waitForSelector: ".section__title-text"
      timeout: 20000
      sectionScript: >
        (() => {
          const h2s = Array.from(document.querySelectorAll('h2'));
          const seasonal = h2s.find(h => h.textContent.trim() === 'Seasonal Treats');
          if (!seasonal) return '<div></div>';
          const li = seasonal.closest('.o-layout__item');
          if (!li) return '<div></div>';
          const siblings = Array.from(li.parentElement.children);
          const start = siblings.indexOf(li);
          const titles = []; const images = []; const descs = [];
          for (let i = start + 1; i < siblings.length; i++) {
            const el = siblings[i];
            const h = el.querySelector('h2');
            const img = el.querySelector('img.home-custom__img');
            const p = el.querySelector('p');
            if (h && h.textContent.trim()) { titles.push(h.textContent.trim()); descs.push(p ? p.textContent.trim() : ''); }
            if (img) images.push(img.src);
          }
          let html = '<div>';
          for (let i = 0; i < titles.length; i++) {
            html += '<div class="item"><h3>' + titles[i] + '</h3>';
            if (images[i]) html += '<img src="' + JSON.stringify(images[i]).slice(1,-1) + '">';
            if (descs[i]) html += '<p>' + descs[i] + '</p>';
            html += '</div>';
          }
          html += '</div>';
          return html;
        })()

  # Island Popper Gourmet Popcorn — Square Online (JS-rendered Vue app)
  # Single featured product layout — no item container, uses ancestor-walk mode
  island-popper:
    type: browser
    selectors:
      item: ".item"
      title: "h3"
      price: ".price"
      image: "img"
    browser:
      waitForSelector: ".w-product-title"
      timeout: 25000
      sectionScript: >
        (() => {
          const title = document.querySelector('.w-product-title');
          const price = document.querySelector('.product-price__wrapper');
          const img = document.querySelector('.figure__image img');
          if (!title) return '<div></div>';
          let html = '<div class="item"><h3>' + title.textContent.trim() + '</h3>';
          if (price) html += '<span class="price">' + price.textContent.trim() + '</span>';
          if (img) html += '<img src="' + (img.src || img.getAttribute('srcset')?.split(' ')[0] || '') + '">';
          html += '</div>';
          return '<div>' + html + '</div>';
        })()

  # Sidecar Doughnuts — WordPress, seasonal section extracted via sectionScript
  sidecar-doughnuts:
    type: browser
    selectors:
      item: ".product-card"
      title: "h4"
      image: "picture[data-src]"
    browser:
      waitForSelector: ".product-card"
      timeout: 20000
      sectionScript: >
        (() => {
          const h2s = Array.from(document.querySelectorAll('h2'));
          const seasonal = h2s.find(h => h.textContent.trim() === 'Seasonal flavors');
          if (!seasonal) return '<div></div>';
          const header = seasonal.closest('header');
          if (!header) return '<div></div>';
          const menuBoxes = header.nextElementSibling;
          return menuBoxes ? menuBoxes.outerHTML : '<div></div>';
        })()

  # Baskin-Robbins — Flavor of the Month (browser mode; image is CSS background-image, extracted via sectionScript)
  baskin-robbins:
    type: browser
    selectors:
      item: ".item"
      title: "h3"
      image: "img"
      description: "p"
    browser:
      waitForSelector: ".heading--color-pink-robbins"
      timeout: 20000
      sectionScript: >
        (() => {
          const titleEl = document.querySelector('.heading--color-pink-robbins span');
          const descEl = document.querySelector('.text.u-authorable p');
          const bgEl = document.querySelector('[id*="product_info"][data-action="background"]') || document.querySelector('[data-action="background"]');
          const style = bgEl ? bgEl.getAttribute('style') || '' : '';
          const imgMatch = style.match(/background-image:\s*url\(['"]?([^'")]+)['"]?\)/);
          const title = titleEl ? titleEl.textContent.trim() : '';
          if (!title) return '<div></div>';
          let html = '<div><div class="item"><h3>' + title + '</h3>';
          if (imgMatch) html += '<img src="' + imgMatch[1] + '">';
          if (descEl) html += '<p>' + descEl.textContent.trim() + '</p>';
          html += '</div></div>';
          return html;
        })()

  # Cold Stone Creamery — Signature Creations grid (html mode; first 3 are seasonal)
  coldstone:
    type: html
    selectors:
      item: "ul.parentLanding li"
      title: ".ctabtn"
      image: "img"
      link: "a"

  # Barrio Donas — Square Online (deferred: limited scrapable content)
  # barrio-donas:
  #   type: browser
  #   selectors:
  #     title: ".w-product-title"
  #     price: ".product-price__wrapper"
  #     image: ".figure__image img"
  #   browser:
  #     waitForSelector: ".w-product-title"
  #     timeout: 25000

# ─── Targets ────────────────────────────────────────────────────────
# Each URL to scrape, referencing a site definition above.

targets:
  # Crumbl — weekly rotating flavors (changes every Monday)
  - site: crumbl
    url: "https://crumblcookies.com/"
    region: us-weekly
    enabled: true

  # Sweet Petite — Seasonal & Holiday collection
  # NOTE: the category ID at the end may increment with new seasonal updates
  - site: sweet-petite
    url: "https://www.sweetpetiteconfections.com/shop/SeasonalandHoliday/16"
    region: seasonal
    enabled: true
    exclude_keywords: ["class", "workshop", "private event", "candle", "lollipop", "gift basket", "build your own"]
    exclude_date_titles: true

  # Nothing Bundt Cakes — seasonal hero flavor only
  - site: nothing-bundt-cakes
    url: "https://www.nothingbundtcakes.com/flavors"
    region: all-flavors
    enabled: true
    max_items: 1

  # Insomnia Cookies — "For You" seasonal items only
  - site: insomnia-cookies
    url: "https://insomniacookies.com/menu"
    region: menu
    enabled: true
    exclude_keywords: ["plushie", "pack"]

  # Stella Jean's — seasonal scoops from homepage
  - site: stella-jeans
    url: "https://www.stellajeans.com"
    region: seasonal
    enabled: true
    keywords: ["stracciatella", "creamsicle", "cheesecake", "pistachio", "gulab", "seasonal", "scoops", "mint", "calamansi", "baklava"]

  # Batch & Box — seasonal treats from cookies page
  - site: batch-and-box
    url: "https://www.batchandbox.com/pages/cookies"
    region: seasonal
    enabled: true

  # Island Popper — featured flavor of the month
  - site: island-popper
    url: "https://www.islandpopper.com/featured-flavor"
    region: featured
    enabled: true

  # Sidecar Doughnuts — seasonal flavors only
  - site: sidecar-doughnuts
    url: "https://sidecardoughnuts.com/menu/"
    region: seasonal
    enabled: true

  # Baskin-Robbins — flavor of the month
  - site: baskin-robbins
    url: "https://www.baskinrobbins.com/en/flavor-of-the-month"
    region: flavor-of-the-month
    enabled: true

  # Cold Stone Creamery — first 3 items in signature creations grid are seasonal
  - site: coldstone
    url: "https://www.coldstonecreamery.com/icecream/signaturecreations/index.html"
    region: signature-creations
    enabled: true
    max_items: 3

  # Barrio Donas — deferred (limited scrapable content)
  # - site: barrio-donas
  #   url: "https://www.barriodonas.com/menu"
  #   region: menu
  #   enabled: true
