services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "4321:4321"
    volumes:
      - ./config.yml:/app/config.yml:ro
      - treat-data:/app/data
    environment:
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - DISCORD_TARGET_USER_ID=${DISCORD_TARGET_USER_ID:-}
    networks:
      - caddy_net

networks:
  caddy_net:
    external: true

volumes:
  treat-data:
